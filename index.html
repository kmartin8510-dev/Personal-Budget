<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Budget">
<title>Budget</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #f2f2f7;
  --bg2: #ffffff;
  --bg3: #f2f2f7;
  --label: #000000;
  --label2: #3c3c43;
  --label3: #3c3c4399;
  --sep: #c6c6c8;
  --sep-light: #e5e5ea;
  --blue: #007aff;
  --green: #34c759;
  --red: #ff3b30;
  --orange: #ff9500;
  --fill: #e5e5ea;
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
}
body { font-family: var(--font); background: var(--bg); color: var(--label); min-height: 100vh; }

/* SPINNER */
.spinner-overlay { display:none; position:fixed; inset:0; background:rgba(242,242,247,0.8); z-index:999; align-items:center; justify-content:center; }
.spinner-overlay.show { display:flex; }
.spinner { width:28px; height:28px; border:2.5px solid var(--sep); border-top-color:var(--blue); border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* HEADER */
header {
  background: rgba(242,242,247,0.92);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border-bottom: 0.5px solid var(--sep);
  padding: 52px 20px 8px;
  position: sticky; top: 0; z-index: 100;
}
.header-inner { max-width: 600px; margin: 0 auto; }
.header-title { font-size: 34px; font-weight: 700; color: var(--label); letter-spacing: -0.5px; line-height: 1.1; }
.header-sub { font-size: 13px; color: var(--label3); margin-top: 2px; }

/* TABS */
.tab-bar {
  background: rgba(242,242,247,0.92);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border-bottom: 0.5px solid var(--sep);
  position: sticky; top: 97px; z-index: 99;
}
.tab-bar-inner { max-width: 600px; margin: 0 auto; display: flex; }
.tab {
  flex: 1; padding: 10px 8px;
  font-family: var(--font); font-size: 13px; font-weight: 500;
  color: var(--label3); background: none; border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer; text-align: center;
  transition: all 0.15s;
}
.tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* PAGE */
.page { max-width: 600px; margin: 0 auto; padding: 20px 0 40px; }
@media(min-width: 640px) { .page { padding: 28px 20px 60px; } }

/* SECTION — iOS grouped style */
.section { margin: 0 0 32px; }
.section-header { font-size: 13px; font-weight: 400; color: var(--label3); text-transform: uppercase; letter-spacing: 0.04em; padding: 0 20px 6px; }
.section-body { background: var(--bg2); border-top: 0.5px solid var(--sep); border-bottom: 0.5px solid var(--sep); }
@media(min-width: 640px) {
  .section-body { border: 0.5px solid var(--sep); border-radius: 12px; overflow: hidden; }
}

/* SUMMARY HERO */
.hero { padding: 24px 20px 20px; text-align: center; }
.hero-amount { font-size: 52px; font-weight: 300; color: var(--label); letter-spacing: -2px; line-height: 1; }
.hero-amount.over { color: var(--red); }
.hero-label { font-size: 13px; color: var(--label3); margin-top: 4px; }
.hero-pills { display: flex; justify-content: center; gap: 12px; margin-top: 16px; }
.hero-pill { text-align: center; }
.hero-pill-val { font-size: 17px; font-weight: 600; color: var(--label); }
.hero-pill-label { font-size: 11px; color: var(--label3); margin-top: 1px; }

/* LIST ROWS */
.row { display: flex; align-items: center; padding: 12px 20px; border-bottom: 0.5px solid var(--sep-light); min-height: 48px; }
.row:last-child { border-bottom: none; }
.row-label { flex: 1; font-size: 17px; color: var(--label); }
.row-sub { font-size: 13px; color: var(--label3); margin-top: 1px; }
.row-value { font-size: 17px; color: var(--label2); font-variant-numeric: tabular-nums; }
.row-value.neg { color: var(--red); }
.row-right { display: flex; align-items: center; gap: 8px; }

/* STATUS BADGE */
.badge { font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
.badge-ok   { background: #d1f2d6; color: #1a7f37; }
.badge-over { background: #ffe5e3; color: var(--red); }
.badge-warn { background: #fff3cd; color: #b45309; }
.badge-full { background: var(--fill); color: var(--label2); }

/* FORM */
.form-section { margin: 0 0 20px; }
.input-row { display: flex; align-items: center; padding: 0 20px; border-bottom: 0.5px solid var(--sep-light); background: var(--bg2); min-height: 48px; }
.input-row:last-child { border-bottom: none; }
.input-row label { font-size: 17px; color: var(--label); width: 110px; flex-shrink: 0; }
.input-row input, .input-row select {
  flex: 1; border: none; outline: none; background: transparent;
  font-family: var(--font); font-size: 17px; color: var(--label);
  padding: 13px 0; text-align: right;
  -webkit-appearance: none;
}
.input-row input::placeholder { color: var(--label3); }
.input-row select { color: var(--label2); }

/* TOGGLE */
.type-toggle { display: flex; background: var(--fill); border-radius: 9px; padding: 2px; margin: 16px 20px; }
.type-btn { flex: 1; padding: 8px; font-family: var(--font); font-size: 14px; font-weight: 500; border: none; border-radius: 7px; cursor: pointer; background: transparent; color: var(--label3); transition: all 0.2s; }
.type-btn.planned.active { background: var(--bg2); color: var(--green); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.12); }
.type-btn.impulse.active { background: var(--bg2); color: var(--red); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.12); }

/* PRIMARY BUTTON */
.primary-btn {
  display: block; width: calc(100% - 40px); margin: 0 20px;
  padding: 15px; background: var(--blue); color: #fff;
  border: none; border-radius: 12px;
  font-family: var(--font); font-size: 17px; font-weight: 600;
  cursor: pointer; transition: opacity 0.15s;
}
.primary-btn:active { opacity: 0.75; }
.primary-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* MESSAGES */
.msg { margin: 12px 20px 0; padding: 12px 16px; border-radius: 10px; font-size: 14px; display: none; }
.msg.success { background: #d1f2d6; color: #1a7f37; display: block; }
.msg.error   { background: #ffe5e3; color: var(--red); display: block; }

/* EXPENSE LIST */
.month-group { margin-bottom: 32px; }
.month-label { font-size: 13px; color: var(--label3); text-transform: uppercase; letter-spacing: 0.04em; padding: 0 20px 6px; }
.exp-row { display: flex; align-items: center; gap: 12px; padding: 10px 20px; border-bottom: 0.5px solid var(--sep-light); background: var(--bg2); }
.exp-row:first-of-type { border-top: 0.5px solid var(--sep); }
.exp-row:last-of-type { border-bottom: 0.5px solid var(--sep); }
@media(min-width:640px) {
  .exp-row:first-of-type { border-top: none; }
  .exp-row:last-of-type { border-bottom: none; }
}
.exp-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.exp-info { flex: 1; min-width: 0; }
.exp-desc { font-size: 15px; color: var(--label); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.exp-meta { font-size: 12px; color: var(--label3); margin-top: 1px; }
.exp-amt { font-size: 15px; font-weight: 500; color: var(--label); flex-shrink: 0; }
.exp-actions { display: flex; gap: 6px; flex-shrink: 0; }
.act-btn { font-family: var(--font); font-size: 12px; font-weight: 500; padding: 5px 10px; border-radius: 6px; border: none; cursor: pointer; }
.act-edit { background: var(--fill); color: var(--blue); }
.act-del  { background: #ffe5e3; color: var(--red); }
.type-chip { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; margin-left: 4px; }
.chip-planned { background: #d1f2d6; color: #1a7f37; }
.chip-impulse { background: #ffe5e3; color: var(--red); }

/* CHARTS */
.chart-toggle { display: flex; background: var(--fill); border-radius: 9px; padding: 2px; margin: 0 20px 20px; }
.chart-btn { flex: 1; padding: 7px 4px; font-family: var(--font); font-size: 12px; font-weight: 500; border: none; border-radius: 7px; cursor: pointer; background: transparent; color: var(--label3); text-align: center; transition: all 0.2s; }
.chart-btn.active { background: var(--bg2); color: var(--label); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.12); }
.month-nav { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 12px 20px 0; }
.nav-btn { background: none; border: none; font-size: 20px; color: var(--blue); cursor: pointer; padding: 4px 8px; }
.nav-label { font-size: 15px; font-weight: 600; color: var(--label); min-width: 110px; text-align: center; }
.chart-area { padding: 16px 20px; }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.bar-label { font-size: 12px; color: var(--label3); width: 30px; text-align: right; flex-shrink: 0; }
.bar-track { flex: 1; background: var(--fill); border-radius: 4px; height: 20px; overflow: hidden; }
.bar-val { font-size: 12px; color: var(--label3); width: 100px; flex-shrink: 0; }
.chart-legend { display: flex; gap: 16px; margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--sep-light); }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--label3); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* REFRESH */
.refresh-row { display: flex; justify-content: flex-end; padding: 8px 20px 0; }
.refresh-btn { font-family: var(--font); font-size: 14px; color: var(--blue); background: none; border: none; cursor: pointer; }

/* MODAL */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; align-items:flex-end; justify-content:center; padding: 0; }
.modal-bg.open { display:flex; }
.modal { background: var(--bg); border-radius: 12px 12px 0 0; width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; padding-bottom: 32px; }
.modal-handle { width: 36px; height: 4px; background: var(--sep); border-radius: 2px; margin: 12px auto 16px; }
.modal-title { font-size: 17px; font-weight: 600; color: var(--label); text-align: center; padding-bottom: 16px; }
.modal-actions { display: flex; gap: 12px; padding: 16px 20px 0; }
.modal-actions .primary-btn { margin: 0; flex: 1; }
.cancel-btn { flex: 1; padding: 15px; background: var(--fill); color: var(--label); border: none; border-radius: 12px; font-family: var(--font); font-size: 17px; font-weight: 500; cursor: pointer; }

.loading { text-align:center; color:var(--label3); font-size:14px; padding:32px 20px; }
</style>
</head>
<body>

<div class="spinner-overlay" id="spinnerOverlay"><div class="spinner"></div></div>

<header>
  <div class="header-inner">
    <div class="header-title">Budget</div>
    <div class="header-sub">March 2026</div>
  </div>
</header>

<div class="tab-bar">
  <div class="tab-bar-inner">
    <button class="tab active" onclick="showTab('overview',this)">Overview</button>
    <button class="tab" onclick="showTab('expenses',this)">Expenses</button>
    <button class="tab" onclick="showTab('insights',this)">Insights</button>
  </div>
</div>

<!-- OVERVIEW -->
<div id="tab-overview" class="tab-content active">
  <div class="page">
    <div class="refresh-row"><button class="refresh-btn" onclick="loadAll()">Refresh ↻</button></div>

    <!-- Hero -->
    <div class="hero">
      <div class="hero-amount" id="heroRemaining">—</div>
      <div class="hero-label">Remaining this month</div>
      <div class="hero-pills">
        <div class="hero-pill"><div class="hero-pill-val" id="heroBudgeted">—</div><div class="hero-pill-label">Budgeted</div></div>
        <div class="hero-pill" style="color:var(--sep)">·</div>
        <div class="hero-pill"><div class="hero-pill-val" id="heroSpent">—</div><div class="hero-pill-label">Spent</div></div>
      </div>
    </div>

    <!-- Categories -->
    <div class="section">
      <div class="section-header">Categories</div>
      <div class="section-body" id="categoryList"><div class="loading">Loading...</div></div>
    </div>
  </div>
</div>

<!-- EXPENSES -->
<div id="tab-expenses" class="tab-content">
  <div class="page">
    <!-- Log form -->
    <div class="section">
      <div class="section-header">Log Expense</div>
      <div class="type-toggle">
        <button class="type-btn planned active" id="btnPlanned" onclick="setType('Planned')">✓ Planned</button>
        <button class="type-btn impulse" id="btnImpulse" onclick="setType('Impulse')">⚡ Impulse</button>
      </div>
      <div class="section-body">
        <div class="input-row"><label>Date</label><input type="date" id="expDate" /></div>
        <div class="input-row"><label>Category</label>
          <select id="expCat">
            <option value="">Select...</option>
            <option>Housing (Rent/Mortgage)</option><option>Groceries</option>
            <option>Utilities</option><option>Transportation</option>
            <option>Dining Out / Entertainment</option><option>Health / Medical</option>
            <option>Savings / Investments</option><option>Personal / Misc</option>
            <option>Tennis</option><option>Home</option>
            <option>Personal Care</option><option>Subscriptions</option>
          </select>
        </div>
        <div class="input-row"><label>Description</label><input type="text" id="expDesc" placeholder="e.g. Trader Joe's" /></div>
        <div class="input-row"><label>Amount</label><input type="number" id="expAmt" placeholder="0.00" step="0.01" min="0" /></div>
        <div class="input-row"><label>Notes</label><input type="text" id="expNotes" placeholder="Optional" /></div>
      </div>
      <br>
      <button class="primary-btn" id="submitBtn" onclick="logExpense()">Add Expense</button>
      <div class="msg" id="formMsg"></div>
    </div>

    <!-- Expense history -->
    <div class="section">
      <div class="section-header">History</div>
      <div id="expensesList"><div class="loading">Loading...</div></div>
    </div>
  </div>
</div>

<!-- INSIGHTS -->
<div id="tab-insights" class="tab-content">
  <div class="page">
    <div class="section">
      <div class="month-nav">
        <button class="nav-btn" onclick="changeInsightMonth(-1)">‹</button>
        <div class="nav-label" id="insightMonthLabel">March 2026</div>
        <button class="nav-btn" onclick="changeInsightMonth(1)">›</button>
      </div>
      <br>
      <div class="chart-toggle">
        <button class="chart-btn active" onclick="showChart('daily',this)">Daily</button>
        <button class="chart-btn" onclick="showChart('impulse',this)">Impulse</button>
        <button class="chart-btn" onclick="showChart('weekly',this)">Weekly</button>
      </div>
      <div class="section-body">
        <div class="chart-area" id="chartArea"><div class="loading">Loading...</div></div>
      </div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Expense</div>
    <div class="type-toggle">
      <button class="type-btn planned" id="editBtnPlanned" onclick="setEditType('Planned')">✓ Planned</button>
      <button class="type-btn impulse" id="editBtnImpulse" onclick="setEditType('Impulse')">⚡ Impulse</button>
    </div>
    <div class="section-body" style="margin:0 20px;border-radius:12px;overflow:hidden;border:0.5px solid var(--sep)">
      <div class="input-row"><label>Date</label><input type="date" id="editDate" /></div>
      <div class="input-row"><label>Category</label>
        <select id="editCat">
          <option>Housing (Rent/Mortgage)</option><option>Groceries</option>
          <option>Utilities</option><option>Transportation</option>
          <option>Dining Out / Entertainment</option><option>Health / Medical</option>
          <option>Savings / Investments</option><option>Personal / Misc</option>
          <option>Tennis</option><option>Home</option>
          <option>Personal Care</option><option>Subscriptions</option>
        </select>
      </div>
      <div class="input-row"><label>Description</label><input type="text" id="editDesc" /></div>
      <div class="input-row"><label>Amount</label><input type="number" id="editAmt" step="0.01" /></div>
      <div class="input-row"><label>Notes</label><input type="text" id="editNotes" /></div>
    </div>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      <button class="primary-btn" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<script>
var WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzHA3UPyDp7DGZ4zXtHZEG2YcDRVQFeiDXAixz3Hh2zJ2Vvp9elfAojshmNerwbKnSD/exec";
var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
var allExpenses = [], budgetData = [];
var expenseType = "Planned", editType = "Planned", editRowIndex = null;
var insightDate = new Date(2026, 2, 1);
var activeChart = "daily", activeTab = "overview";
var today = new Date();
document.getElementById("expDate").value = today.toISOString().split("T")[0];

function showSpinner(on) { document.getElementById("spinnerOverlay").classList.toggle("show", on); }

function fmt(n) {
  var abs = Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
  return (n < 0 ? "-$" : "$") + abs;
}

function showTab(name, el) {
  activeTab = name;
  document.querySelectorAll(".tab-content").forEach(function(t){ t.classList.remove("active"); });
  document.querySelectorAll(".tab").forEach(function(t){ t.classList.remove("active"); });
  document.getElementById("tab-" + name).classList.add("active");
  if (el) el.classList.add("active");
  if (name === "insights") renderChart();
}

function setType(t) {
  expenseType = t;
  document.getElementById("btnPlanned").classList.toggle("active", t==="Planned");
  document.getElementById("btnImpulse").classList.toggle("active", t==="Impulse");
}
function setEditType(t) {
  editType = t;
  document.getElementById("editBtnPlanned").classList.toggle("active", t==="Planned");
  document.getElementById("editBtnImpulse").classList.toggle("active", t==="Impulse");
}

function loadAll(silent) {
  if (!silent) showSpinner(true);
  fetch(WEB_APP_URL + "?t=" + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(data){
      budgetData  = data.budget   || [];
      allExpenses = data.expenses || [];
      renderOverview();
      renderExpenses();
      if (activeTab === "insights") renderChart();
      showSpinner(false);
    })
    .catch(function(){
      document.getElementById("categoryList").innerHTML = "<div class='loading' style='color:var(--red)'>Could not load data.</div>";
      showSpinner(false);
    });
}

function renderOverview() {
  var totalB = 0, totalS = 0;
  budgetData.forEach(function(r){ totalB += r.budgeted; totalS += r.spent; });
  var totalR = totalB - totalS;

  var hero = document.getElementById("heroRemaining");
  hero.textContent = fmt(totalR);
  hero.className = "hero-amount" + (totalR < 0 ? " over" : "");
  document.getElementById("heroBudgeted").textContent = fmt(totalB);
  document.getElementById("heroSpent").textContent    = fmt(totalS);

  var html = "";
  budgetData.forEach(function(r){
    var rem = r.budgeted - r.spent;
    var pct = r.budgeted > 0 ? r.spent / r.budgeted : 0;
    var bc, bt;
    if      (rem < 0)      { bc="badge-over"; bt="Over"; }
    else if (pct >= 0.999) { bc="badge-full"; bt="100%"; }
    else if (pct > 0.85)   { bc="badge-warn"; bt="85%+"; }
    else                   { bc="badge-ok";   bt="✓"; }
    html += "<div class='row'><div><div class='row-label'>" + r.category + "</div><div class='row-sub'>" + fmt(r.spent) + " of " + fmt(r.budgeted) + "</div></div><div class='row-right'><span class='row-value" + (rem<0?" neg":"") + "'>" + fmt(rem) + "</span><span class='badge " + bc + "'>" + bt + "</span></div></div>";
  });
  document.getElementById("categoryList").innerHTML = html || "<div class='loading'>No data</div>";
}

function renderExpenses() {
  var el = document.getElementById("expensesList");
  if (!allExpenses.length) { el.innerHTML = "<div class='loading'>No expenses yet.</div>"; return; }

  var byMonth = {};
  allExpenses.forEach(function(e, i){
    var m = e.month || "Unknown";
    if (!byMonth[m]) byMonth[m] = [];
    byMonth[m].push(Object.assign({}, e, {_idx:i}));
  });

  var sorted = Object.keys(byMonth).sort(function(a,b){
    var p = function(s){ var x=s.split(" "); return new Date(x[0]+" 1,"+(x[1]||2026)); };
    return p(b)-p(a);
  });

  var html = "";
  sorted.forEach(function(month, mi){
    var entries = byMonth[month];
    var total   = entries.reduce(function(s,e){ return s+e.amount; },0);
    var impN    = entries.filter(function(e){ return (e.type||"").toLowerCase()==="impulse"; }).length;

    var byDate = {};
    entries.forEach(function(e){
      var d = e.date||"Unknown";
      if (!byDate[d]) byDate[d] = [];
      byDate[d].push(e);
    });

    html += "<div class='month-group'><div class='month-label'>" + month + " &nbsp;·&nbsp; " + fmt(total) + (impN>0?" &nbsp;·&nbsp; <span style='color:var(--red)'>"+impN+" impulse</span>":"") + "</div>";

    Object.keys(byDate).sort().reverse().forEach(function(date){
      byDate[date].forEach(function(e){
        var isImp = (e.type||"").toLowerCase()==="impulse";
        var dot   = isImp ? "var(--red)" : "var(--green)";
        var chip  = isImp ? "<span class='type-chip chip-impulse'>Impulse</span>" : "<span class='type-chip chip-planned'>Planned</span>";
        html += "<div class='exp-row'><div class='exp-dot' style='background:"+dot+"'></div><div class='exp-info'><div class='exp-desc'>"+( e.description||"—")+chip+"</div><div class='exp-meta'>"+e.category+" · "+(date!=="Unknown"?new Date(date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}):date)+"</div></div><div class='exp-amt'>"+fmt(e.amount)+"</div><div class='exp-actions'><button class='act-btn act-edit' onclick='openEdit("+e._idx+")'>Edit</button><button class='act-btn act-del' onclick='deleteExpense("+e._idx+")'>Delete</button></div></div>";
      });
    });
    html += "</div>";
  });
  el.innerHTML = html;
}

function showChart(name, el) {
  activeChart = name;
  document.querySelectorAll(".chart-btn").forEach(function(t){ t.classList.remove("active"); });
  if (el) el.classList.add("active");
  renderChart();
}
function changeInsightMonth(dir) {
  insightDate = new Date(insightDate.getFullYear(), insightDate.getMonth()+dir, 1);
  document.getElementById("insightMonthLabel").textContent = MONTHS[insightDate.getMonth()]+" "+insightDate.getFullYear();
  renderChart();
}
function renderChart() {
  var mo  = MONTHS[insightDate.getMonth()]+" "+insightDate.getFullYear();
  var exp = allExpenses.filter(function(e){ return e.month===mo; });
  var area = document.getElementById("chartArea");
  if      (activeChart==="daily")   area.innerHTML = chartDaily(exp);
  else if (activeChart==="impulse") area.innerHTML = chartImpulse(exp);
  else                              area.innerHTML = chartWeekly(exp);
}
function chartDaily(exp) {
  var days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"], t=[0,0,0,0,0,0,0];
  exp.forEach(function(e){ if(e.date) t[new Date(e.date+"T12:00:00").getDay()]+=e.amount; });
  var max=Math.max.apply(null,t.concat([1]));
  return days.map(function(d,i){ return "<div class='bar-row'><div class='bar-label'>"+d+"</div><div class='bar-track'><div style='width:"+(t[i]/max*100).toFixed(1)+"%;height:100%;background:var(--blue);border-radius:4px'></div></div><div class='bar-val'>"+(t[i]>0?fmt(t[i]):"—")+"</div></div>"; }).join("");
}
function chartImpulse(exp) {
  var days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],imp=[0,0,0,0,0,0,0],pln=[0,0,0,0,0,0,0];
  exp.forEach(function(e){ if(!e.date) return; var d=new Date(e.date+"T12:00:00").getDay(); (e.type||"").toLowerCase()==="impulse"?imp[d]++:pln[d]++; });
  var max=Math.max.apply(null,days.map(function(_,i){ return imp[i]+pln[i]; }).concat([1]));
  var bars=days.map(function(d,i){ var tot=imp[i]+pln[i]; return "<div class='bar-row'><div class='bar-label'>"+d+"</div><div class='bar-track'><div style='display:flex;height:100%;width:"+(tot/max*100).toFixed(1)+"%'><div style='width:"+(tot>0?(pln[i]/tot*100).toFixed(1):0)+"%;background:var(--green);height:100%'></div><div style='width:"+(tot>0?(imp[i]/tot*100).toFixed(1):0)+"%;background:var(--red);height:100%'></div></div></div><div class='bar-val'>"+(tot>0?tot+" buys":"—")+"</div></div>"; }).join("");
  return bars+"<div class='chart-legend'><div class='legend-item'><div class='legend-dot' style='background:var(--green)'></div>Planned</div><div class='legend-item'><div class='legend-dot' style='background:var(--red)'></div>Impulse</div></div>";
}
function chartWeekly(exp) {
  var w=[{s:0,i:0,p:0},{s:0,i:0,p:0},{s:0,i:0,p:0},{s:0,i:0,p:0}];
  exp.forEach(function(e){ if(!e.date) return; var wk=Math.min(Math.floor((new Date(e.date+"T12:00:00").getDate()-1)/7),3); w[wk].s+=e.amount; (e.type||"").toLowerCase()==="impulse"?w[wk].i++:w[wk].p++; });
  var max=Math.max.apply(null,w.map(function(x){ return x.s; }).concat([1]));
  return w.map(function(x,i){ return "<div class='bar-row'><div class='bar-label'>Wk "+(i+1)+"</div><div class='bar-track'><div style='width:"+(x.s/max*100).toFixed(1)+"%;height:100%;background:var(--blue);border-radius:4px'></div></div><div class='bar-val' style='font-size:11px'>"+(x.s>0?fmt(x.s)+" · "+x.p+"P "+x.i+"I":"—")+"</div></div>"; }).join("") + "<div class='chart-legend'><div class='legend-item'><div class='legend-dot' style='background:var(--blue)'></div>Spend</div><div class='legend-item'>P=Planned I=Impulse</div></div>";
}

function logExpense() {
  var date=document.getElementById("expDate").value, cat=document.getElementById("expCat").value;
  var desc=document.getElementById("expDesc").value.trim(), amt=document.getElementById("expAmt").value;
  var notes=document.getElementById("expNotes").value.trim();
  var msg=document.getElementById("formMsg"), btn=document.getElementById("submitBtn");
  msg.className="msg"; msg.style.display="none";
  if(!date||!cat||!desc||!amt){ msg.textContent="Please fill in date, category, description and amount."; msg.className="msg error"; return; }
  btn.disabled=true; btn.textContent="Saving...";
  var month=new Date(date+"T12:00:00").toLocaleDateString("en-US",{month:"long",year:"numeric"});
  fetch(WEB_APP_URL,{method:"POST",body:JSON.stringify({action:"add",date:date,category:cat,description:desc,amount:parseFloat(amt),notes:notes,month:month,type:expenseType})})
    .then(function(r){ return r.text(); })
    .then(function(t){
      var d=JSON.parse(t);
      if(!d.success) throw new Error(d.error||"failed");
      msg.textContent="Expense added!"; msg.className="msg success";
      document.getElementById("expCat").value=""; document.getElementById("expDesc").value="";
      document.getElementById("expAmt").value=""; document.getElementById("expNotes").value="";
      document.getElementById("expDate").value=today.toISOString().split("T")[0];
      btn.disabled=false; btn.textContent="Add Expense";
      setTimeout(function(){ loadAll(true); },800);
    })
    .catch(function(e){ msg.textContent="Error: "+e.message; msg.className="msg error"; btn.disabled=false; btn.textContent="Add Expense"; });
}

function openEdit(idx) {
  var e=allExpenses[idx]; editRowIndex=idx; editType=e.type||"Planned";
  document.getElementById("editDate").value=e.date||"";
  document.getElementById("editCat").value=e.category||"";
  document.getElementById("editDesc").value=e.description||"";
  document.getElementById("editAmt").value=e.amount||"";
  document.getElementById("editNotes").value=e.notes||"";
  setEditType(editType);
  document.getElementById("editModal").classList.add("open");
}
function closeModal(){ document.getElementById("editModal").classList.remove("open"); }
function saveEdit() {
  var date=document.getElementById("editDate").value, cat=document.getElementById("editCat").value;
  var desc=document.getElementById("editDesc").value.trim(), amt=document.getElementById("editAmt").value;
  var notes=document.getElementById("editNotes").value.trim();
  var month=new Date(date+"T12:00:00").toLocaleDateString("en-US",{month:"long",year:"numeric"});
  var e=allExpenses[editRowIndex];
  fetch(WEB_APP_URL,{method:"POST",body:JSON.stringify({action:"edit",sheetRow:e.sheetRow,date:date,category:cat,description:desc,amount:parseFloat(amt),notes:notes,month:month,type:editType})})
    .then(function(r){ return r.text(); })
    .then(function(t){ var d=JSON.parse(t); if(!d.success) throw new Error(d.error||"failed"); closeModal(); loadAll(true); })
    .catch(function(e){ alert("Could not save: "+e.message); });
}
function deleteExpense(idx) {
  if(!confirm("Delete this expense?")) return;
  var e=allExpenses[idx];
  fetch(WEB_APP_URL,{method:"POST",body:JSON.stringify({action:"delete",sheetRow:e.sheetRow})})
    .then(function(r){ return r.text(); })
    .then(function(t){ var d=JSON.parse(t); if(!d.success) throw new Error(d.error||"failed"); loadAll(true); })
    .catch(function(e){ alert("Could not delete: "+e.message); });
}

loadAll();
</script>
</body>
