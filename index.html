<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Budget">
<title>Budget</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #1e3a5f;
  --navy-light: #e8eef5;
  --white: #ffffff;
  --grey-light: #f7f7f7;
  --grey-mid: #dedede;
  --grey-text: #888888;
  --black: #1a1a1a;
  --red: #c0392b;
  --green: #27ae60;
  --orange: #e67e22;
  --font: Georgia, serif;
}

body { font-family: var(--font); background: #f7f9fc; color: var(--black); min-height: 100vh; }

/* HEADER */
header {
  background: var(--white);
  border-bottom: 2px solid var(--navy);
  padding: 14px 24px;
  display: flex;
  align-items: baseline;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
header h1 { font-size: 18px; font-weight: bold; color: var(--navy); }
header span { font-size: 12px; color: var(--grey-text); }

/* TABS */
.tabs {
  background: var(--white);
  border-bottom: 1px solid var(--grey-mid);
  display: flex;
  position: sticky;
  top: 52px;
  z-index: 99;
}
.tab {
  flex: 1;
  padding: 12px 8px;
  text-align: center;
  font-family: var(--font);
  font-size: 12px;
  font-weight: bold;
  color: var(--grey-text);
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  cursor: pointer;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: all 0.15s;
}
.tab.active { color: var(--navy); border-bottom-color: var(--navy); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* LAYOUT */
.page { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }
.two-col { display: grid; grid-template-columns: 1fr 340px; gap: 24px; }
@media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

/* CARD */
.card { background: var(--white); border: 1px solid var(--grey-mid); border-radius: 6px; padding: 20px; margin-bottom: 16px; }
.card-title {
  font-size: 11px; font-weight: bold; color: var(--navy);
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 1px solid var(--navy-light);
  display: flex; justify-content: space-between; align-items: center;
}

/* SUMMARY BAR */
.summary-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.summary-item { flex: 1; min-width: 90px; background: var(--navy-light); border-radius: 6px; padding: 12px 14px; }
.s-label { font-size: 9px; font-weight: bold; color: var(--navy); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
.s-val { font-size: 18px; font-weight: bold; color: var(--navy); }
.s-val.over { color: var(--red); }

/* BUDGET TABLE */
.budget-table { width: 100%; border-collapse: collapse; }
.budget-table th { font-size: 9px; font-weight: bold; color: var(--navy); background: var(--navy-light); padding: 8px 10px; text-align: left; letter-spacing: 0.06em; text-transform: uppercase; }
.budget-table th.num { text-align: right; }
.budget-table td { padding: 10px; font-size: 13px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
.budget-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
.budget-table tr:nth-child(even) td { background: #fafafa; }
.over-text { color: var(--red); font-weight: bold; }
.ok-text { color: var(--green); }
.warn-text { color: var(--orange); }
.status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
.dot-ok { background: var(--green); }
.dot-over { background: var(--red); }
.dot-warn { background: var(--orange); }
.dot-full { background: var(--navy); }

/* MOBILE BUDGET CARDS */
.budget-cards { display: none; }
@media (max-width: 768px) {
  .budget-table-wrap { display: none; }
  .budget-cards { display: block; }
}
.budget-card {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-bottom: 1px solid #f0f0f0;
}
.budget-card:last-child { border-bottom: none; }
.bc-left { flex: 1; }
.bc-cat { font-size: 13px; color: var(--black); margin-bottom: 3px; }
.bc-sub { font-size: 11px; color: var(--grey-text); }
.bc-right { text-align: right; }
.bc-rem { font-size: 14px; font-weight: bold; }
.bc-status { font-size: 10px; margin-top: 2px; }

/* FORM */
.form-group { margin-bottom: 14px; }
label { display: block; font-size: 9px; font-weight: bold; color: var(--navy); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
input, select { width: 100%; padding: 10px 12px; border: 1px solid var(--grey-mid); border-radius: 4px; font-family: var(--font); font-size: 14px; color: var(--black); background: var(--white); outline: none; transition: border-color 0.15s; }
input:focus, select:focus { border-color: var(--navy); }

/* TOGGLE */
.toggle-wrap { display: flex; gap: 8px; }
.toggle-btn {
  flex: 1; padding: 12px; border: 2px solid var(--grey-mid);
  border-radius: 6px; font-family: var(--font); font-size: 13px;
  font-weight: bold; cursor: pointer; background: var(--white);
  color: var(--grey-text); transition: all 0.15s; text-align: center;
}
.toggle-btn.planned.active { border-color: var(--green); background: #eafaf1; color: var(--green); }
.toggle-btn.impulse.active { border-color: var(--red); background: #fdf0ef; color: var(--red); }

/* BUTTONS */
.btn { width: 100%; padding: 12px; background: var(--navy); color: var(--white); border: none; border-radius: 4px; font-family: var(--font); font-size: 14px; font-weight: bold; cursor: pointer; transition: background 0.15s; margin-top: 4px; }
.btn:hover { background: #16304f; }
.btn:disabled { background: #aaa; cursor: not-allowed; }
.btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 3px; border: none; cursor: pointer; font-family: var(--font); font-weight: bold; }
.btn-edit { background: var(--navy-light); color: var(--navy); }
.btn-delete { background: #fdf0ef; color: var(--red); }
.refresh-btn { font-size: 11px; color: var(--navy); background: none; border: none; cursor: pointer; font-family: var(--font); text-decoration: underline; padding: 0; }

/* MESSAGES */
.msg { margin-top: 10px; padding: 10px 12px; border-radius: 4px; font-size: 12px; display: none; }
.msg.success { background: #eafaf1; color: var(--green); border: 1px solid #a9dfbf; display: block; }
.msg.error { background: #fdf0ef; color: var(--red); border: 1px solid #f5b7b1; display: block; }
.loading { text-align: center; color: var(--grey-text); font-size: 13px; padding: 32px 0; }

/* EXPENSES LIST */
.exp-group-date { font-size: 11px; font-weight: bold; color: var(--grey-text); letter-spacing: 0.06em; text-transform: uppercase; padding: 12px 0 6px; border-bottom: 1px solid var(--grey-mid); margin-bottom: 4px; }
.exp-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
.exp-type-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.exp-info { flex: 1; }
.exp-desc { font-size: 13px; color: var(--black); }
.exp-cat { font-size: 11px; color: var(--grey-text); }
.exp-amt { font-size: 14px; font-weight: bold; color: var(--black); text-align: right; margin-right: 8px; }
.exp-actions { display: flex; gap: 4px; }
.type-tag { font-size: 9px; font-weight: bold; padding: 2px 6px; border-radius: 10px; }
.tag-planned { background: #eafaf1; color: var(--green); }
.tag-impulse { background: #fdf0ef; color: var(--red); }

/* CHARTS */
.chart-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.chart-tab { padding: 6px 14px; border: 1px solid var(--grey-mid); border-radius: 20px; font-family: var(--font); font-size: 11px; cursor: pointer; background: var(--white); color: var(--grey-text); }
.chart-tab.active { background: var(--navy); color: var(--white); border-color: var(--navy); }
.month-nav { display: flex; align-items: center; gap: 12px; }
.month-nav button { background: none; border: 1px solid var(--grey-mid); border-radius: 4px; padding: 4px 10px; cursor: pointer; font-family: var(--font); font-size: 13px; color: var(--navy); }
.month-nav span { font-size: 13px; font-weight: bold; color: var(--navy); min-width: 100px; text-align: center; }
.chart-wrap { margin-top: 16px; }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.bar-label { font-size: 11px; color: var(--grey-text); width: 36px; text-align: right; flex-shrink: 0; }
.bar-track { flex: 1; background: #f0f0f0; border-radius: 4px; height: 22px; position: relative; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; display: flex; align-items: center; }
.bar-planned { background: var(--green); }
.bar-impulse { background: var(--red); }
.bar-mixed { background: var(--navy); }
.bar-val { font-size: 11px; color: var(--grey-text); width: 70px; text-align: left; flex-shrink: 0; }
.legend { display: flex; gap: 16px; margin-top: 12px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--grey-text); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

/* EDIT MODAL */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
.modal-bg.open { display: flex; }
.modal { background: var(--white); border-radius: 8px; padding: 24px; width: 100%; max-width: 420px; }
.modal-title { font-size: 14px; font-weight: bold; color: var(--navy); margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; }
.modal-actions .btn { margin-top: 0; }
.btn-cancel { background: var(--grey-light); color: var(--black); border: 1px solid var(--grey-mid); }
</style>
</head>
<body>

<header>
  <h1>Budget</h1>
  <span id="headerMonth">March 2026</span>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('budget')">Budget</button>
  <button class="tab" onclick="showTab('log')">Log</button>
  <button class="tab" onclick="showTab('expenses')">Expenses</button>
  <button class="tab" onclick="showTab('insights')">Insights</button>
</div>

<!-- BUDGET TAB -->
<div id="tab-budget" class="tab-content active">
  <div class="page">
    <div class="summary-bar" id="summaryBar">
      <div class="summary-item"><div class="s-label">Budgeted</div><div class="s-val" id="sumBudgeted">—</div></div>
      <div class="summary-item"><div class="s-label">Spent</div><div class="s-val" id="sumSpent">—</div></div>
      <div class="summary-item"><div class="s-label">Remaining</div><div class="s-val" id="sumRemaining">—</div></div>
    </div>
    <div class="card">
      <div class="card-title">
        March 2026
        <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
      </div>
      <!-- Desktop table -->
      <div class="budget-table-wrap">
        <table class="budget-table">
          <thead><tr>
            <th>Category</th>
            <th class="num">Budgeted</th>
            <th class="num">Spent</th>
            <th class="num">Remaining</th>
            <th class="num">Status</th>
          </tr></thead>
          <tbody id="budgetTableBody"><tr><td colspan="5"><div class="loading">Loading...</div></td></tr></tbody>
        </table>
      </div>
      <!-- Mobile cards -->
      <div class="budget-cards" id="budgetCards"><div class="loading">Loading...</div></div>
    </div>
  </div>
</div>

<!-- LOG TAB -->
<div id="tab-log" class="tab-content">
  <div class="page" style="max-width:520px">
    <div class="card">
      <div class="card-title">Log Expense</div>
      <div class="form-group">
        <label>Type</label>
        <div class="toggle-wrap">
          <button class="toggle-btn planned active" id="btnPlanned" onclick="setType('Planned')">✓ Planned</button>
          <button class="toggle-btn impulse" id="btnImpulse" onclick="setType('Impulse')">⚡ Impulse</button>
        </div>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="expDate" />
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="expCat">
          <option value="">Select category...</option>
          <option>Housing (Rent/Mortgage)</option>
          <option>Groceries</option>
          <option>Utilities</option>
          <option>Transportation</option>
          <option>Dining Out / Entertainment</option>
          <option>Health / Medical</option>
          <option>Savings / Investments</option>
          <option>Personal / Misc</option>
          <option>Tennis</option>
          <option>Home</option>
          <option>Personal Care</option>
          <option>Subscriptions</option>
        </select>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="expDesc" placeholder="e.g. Trader Joe's" />
      </div>
      <div class="form-group">
        <label>Amount ($)</label>
        <input type="number" id="expAmt" placeholder="0.00" step="0.01" min="0" />
      </div>
      <div class="form-group">
        <label>Notes (optional)</label>
        <input type="text" id="expNotes" />
      </div>
      <button class="btn" id="submitBtn" onclick="logExpense()">Add Expense</button>
      <div class="msg" id="formMsg"></div>
    </div>
  </div>
</div>

<!-- EXPENSES TAB -->
<div id="tab-expenses" class="tab-content">
  <div class="page">
    <div class="card">
      <div class="card-title">
        This Month's Expenses
        <button class="refresh-btn" onclick="renderExpenses()">↻ Refresh</button>
      </div>
      <div id="expensesList"><div class="loading">Loading...</div></div>
    </div>
  </div>
</div>

<!-- INSIGHTS TAB -->
<div id="tab-insights" class="tab-content">
  <div class="page">
    <div class="card">
      <div class="card-title">
        <span>Insights</span>
        <div class="month-nav">
          <button onclick="changeInsightMonth(-1)">‹</button>
          <span id="insightMonth">March 2026</span>
          <button onclick="changeInsightMonth(1)">›</button>
        </div>
      </div>
      <div class="chart-tabs">
        <button class="chart-tab active" onclick="showChart('daily-spend')">Daily Spend</button>
        <button class="chart-tab" onclick="showChart('impulse-planned')">Impulse vs Planned</button>
        <button class="chart-tab" onclick="showChart('weekly')">4-Week View</button>
      </div>
      <div id="chartArea"><div class="loading">Loading...</div></div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <div class="modal-title">Edit Expense</div>
    <div class="form-group">
      <label>Type</label>
      <div class="toggle-wrap">
        <button class="toggle-btn planned" id="editBtnPlanned" onclick="setEditType('Planned')">✓ Planned</button>
        <button class="toggle-btn impulse" id="editBtnImpulse" onclick="setEditType('Impulse')">⚡ Impulse</button>
      </div>
    </div>
    <div class="form-group"><label>Date</label><input type="date" id="editDate" /></div>
    <div class="form-group">
      <label>Category</label>
      <select id="editCat">
        <option>Housing (Rent/Mortgage)</option><option>Groceries</option>
        <option>Utilities</option><option>Transportation</option>
        <option>Dining Out / Entertainment</option><option>Health / Medical</option>
        <option>Savings / Investments</option><option>Personal / Misc</option>
        <option>Tennis</option><option>Home</option>
        <option>Personal Care</option><option>Subscriptions</option>
      </select>
    </div>
    <div class="form-group"><label>Description</label><input type="text" id="editDesc" /></div>
    <div class="form-group"><label>Amount ($)</label><input type="number" id="editAmt" step="0.01" /></div>
    <div class="form-group"><label>Notes</label><input type="text" id="editNotes" /></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwjCWh970Wc6PIO2faAptZe8WD0XaeAAoyrVFhsdrP3kUqKvExwdfYh918VtyuH6Rg/exec";
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

let allExpenses = [];
let budgetData  = [];
let expenseType = "Planned";
let editType    = "Planned";
let editRowIndex = null;
let insightDate = new Date(2026, 2, 1); // March 2026
let activeChart = "daily-spend";

// Init
const today = new Date();
document.getElementById("expDate").value = today.toISOString().split("T")[0];
loadAll();

function fmt(n) {
  const abs = Math.abs(n).toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
  return (n < 0 ? "-$" : "$") + abs;
}

function showTab(name) {
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
  event.target.classList.add("active");
  if (name === "insights") renderChart();
}

function setType(t) {
  expenseType = t;
  document.getElementById("btnPlanned").classList.toggle("active", t === "Planned");
  document.getElementById("btnImpulse").classList.toggle("active", t === "Impulse");
}

function setEditType(t) {
  editType = t;
  document.getElementById("editBtnPlanned").classList.toggle("active", t === "Planned");
  document.getElementById("editBtnImpulse").classList.toggle("active", t === "Impulse");
}

async function loadAll() {
  try {
    const res  = await fetch(WEB_APP_URL + "?action=getAll");
    const data = await res.json();
    budgetData   = data.budget   || [];
    allExpenses  = data.expenses || [];
    renderBudget();
    renderExpenses();
    if (document.getElementById("tab-insights").classList.contains("active")) renderChart();
  } catch(e) {
    document.getElementById("budgetTableBody").innerHTML = `<tr><td colspan="5"><div class="loading" style="color:var(--red)">Could not load data.</div></td></tr>`;
  }
}

function renderBudget() {
  const month = `${MONTHS[insightDate.getMonth()]} ${insightDate.getFullYear()}`;
  let totalB = 0, totalS = 0;
  budgetData.forEach(r => { totalB += r.budgeted; totalS += r.spent; });
  const totalR = totalB - totalS;

  document.getElementById("sumBudgeted").textContent = fmt(totalB);
  document.getElementById("sumSpent").textContent    = fmt(totalS);
  const re = document.getElementById("sumRemaining");
  re.textContent = fmt(totalR);
  re.className   = "s-val" + (totalR < 0 ? " over" : "");

  // Desktop table
  let html = "";
  budgetData.forEach(r => {
    const rem = r.budgeted - r.spent;
    const pct = r.budgeted > 0 ? r.spent / r.budgeted : 0;
    let sc, dc, st;
    if (rem < 0)          { sc="over-text"; dc="dot-over"; st="OVER"; }
    else if (pct >= 0.999){ sc="";          dc="dot-full"; st="100%"; }
    else if (pct > 0.85)  { sc="warn-text"; dc="dot-warn"; st="85%+"; }
    else                  { sc="ok-text";   dc="dot-ok";   st="✓"; }
    html += `<tr>
      <td>${r.category}</td>
      <td class="num">${fmt(r.budgeted)}</td>
      <td class="num">${fmt(r.spent)}</td>
      <td class="num ${rem<0?"over-text":""}">${fmt(rem)}</td>
      <td class="num"><span class="status-dot ${dc}"></span><span class="${sc}">${st}</span></td>
    </tr>`;
  });
  document.getElementById("budgetTableBody").innerHTML = html || `<tr><td colspan="5" style="text-align:center;color:var(--grey-text);padding:20px">No data</td></tr>`;

  // Mobile cards
  let mhtml = "";
  budgetData.forEach(r => {
    const rem = r.budgeted - r.spent;
    const pct = r.budgeted > 0 ? r.spent / r.budgeted : 0;
    let sc, st;
    if (rem < 0)          { sc="over-text"; st="OVER"; }
    else if (pct >= 0.999){ sc="";          st="100%"; }
    else if (pct > 0.85)  { sc="warn-text"; st="85%+"; }
    else                  { sc="ok-text";   st="✓"; }
    mhtml += `<div class="budget-card">
      <div class="bc-left">
        <div class="bc-cat">${r.category}</div>
        <div class="bc-sub">${fmt(r.spent)} of ${fmt(r.budgeted)}</div>
      </div>
      <div class="bc-right">
        <div class="bc-rem ${rem<0?"over-text":""}">${fmt(rem)}</div>
        <div class="bc-status ${sc}">${st}</div>
      </div>
    </div>`;
  });
  document.getElementById("budgetCards").innerHTML = mhtml || '<div class="loading">No data</div>';
}

function renderExpenses() {
  const month = `${MONTHS[2]} 2026`; // March 2026
  const filtered = allExpenses.filter(e => e.month === "March 2026");
  const el = document.getElementById("expensesList");

  if (!filtered.length) { el.innerHTML = '<div class="loading">No expenses logged yet.</div>'; return; }

  // Group by date
  const groups = {};
  filtered.forEach((e, i) => {
    const d = e.date || "Unknown";
    if (!groups[d]) groups[d] = [];
    groups[d].push({...e, _idx: i});
  });

  let html = "";
  Object.keys(groups).sort().reverse().forEach(date => {
    const label = date !== "Unknown" ? new Date(date + "T12:00:00").toLocaleDateString("en-US", {weekday:"short", month:"short", day:"numeric"}) : "Unknown";
    html += `<div class="exp-group-date">${label}</div>`;
    groups[date].forEach(e => {
      const isImpulse = (e.type || "").toLowerCase() === "impulse";
      const dotColor  = isImpulse ? "var(--red)" : "var(--green)";
      const tag       = isImpulse ? `<span class="type-tag tag-impulse">Impulse</span>` : `<span class="type-tag tag-planned">Planned</span>`;
      html += `<div class="exp-row">
        <div class="exp-type-dot" style="background:${dotColor}"></div>
        <div class="exp-info">
          <div class="exp-desc">${e.description || "—"} ${tag}</div>
          <div class="exp-cat">${e.category}</div>
        </div>
        <div class="exp-amt">${fmt(e.amount)}</div>
        <div class="exp-actions">
          <button class="btn-sm btn-edit" onclick="openEdit(${e._idx})">Edit</button>
          <button class="btn-sm btn-delete" onclick="deleteExpense(${e._idx})">✕</button>
        </div>
      </div>`;
    });
  });
  el.innerHTML = html;
}

// INSIGHTS
function showChart(name) {
  activeChart = name;
  document.querySelectorAll(".chart-tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
  renderChart();
}

function changeInsightMonth(dir) {
  insightDate.setMonth(insightDate.getMonth() + dir);
  document.getElementById("insightMonth").textContent = `${MONTHS[insightDate.getMonth()]} ${insightDate.getFullYear()}`;
  renderChart();
}

function renderChart() {
  const mo = `${MONTHS[insightDate.getMonth()]} ${insightDate.getFullYear()}`;
  const expenses = allExpenses.filter(e => e.month === mo);
  const area = document.getElementById("chartArea");

  if (activeChart === "daily-spend")      area.innerHTML = chartDailySpend(expenses);
  else if (activeChart === "impulse-planned") area.innerHTML = chartImpulsePlanned(expenses);
  else if (activeChart === "weekly")      area.innerHTML = chartWeekly(expenses);
}

function chartDailySpend(expenses) {
  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const totals = Array(7).fill(0);
  expenses.forEach(e => {
    if (!e.date) return;
    const d = new Date(e.date + "T12:00:00").getDay();
    totals[d] += e.amount;
  });
  const max = Math.max(...totals, 1);
  let html = `<div class="chart-wrap">`;
  days.forEach((d, i) => {
    const pct = (totals[i] / max * 100).toFixed(1);
    html += `<div class="bar-row">
      <div class="bar-label">${d}</div>
      <div class="bar-track"><div class="bar-fill bar-mixed" style="width:${pct}%"></div></div>
      <div class="bar-val">${totals[i] > 0 ? fmt(totals[i]) : "—"}</div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

function chartImpulsePlanned(expenses) {
  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const impulse = Array(7).fill(0);
  const planned = Array(7).fill(0);
  expenses.forEach(e => {
    if (!e.date) return;
    const d = new Date(e.date + "T12:00:00").getDay();
    if ((e.type||"").toLowerCase() === "impulse") impulse[d]++;
    else planned[d]++;
  });
  const max = Math.max(...impulse.map((v,i) => v + planned[i]), 1);
  let html = `<div class="chart-wrap">`;
  days.forEach((d, i) => {
    const total = impulse[i] + planned[i];
    const iPct  = (impulse[i] / max * 100).toFixed(1);
    const pPct  = (planned[i] / max * 100).toFixed(1);
    html += `<div class="bar-row">
      <div class="bar-label">${d}</div>
      <div class="bar-track">
        <div style="display:flex;height:100%;width:${((impulse[i]+planned[i])/max*100).toFixed(1)}%">
          <div style="width:${total>0?(planned[i]/total*100).toFixed(1):0}%;background:var(--green);height:100%"></div>
          <div style="width:${total>0?(impulse[i]/total*100).toFixed(1):0}%;background:var(--red);height:100%"></div>
        </div>
      </div>
      <div class="bar-val">${total > 0 ? total + " buys" : "—"}</div>
    </div>`;
  });
  html += `<div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Planned</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Impulse</div>
  </div></div>`;
  return html;
}

function chartWeekly(expenses) {
  const weeks = [0,1,2,3].map(() => ({spend:0, impulse:0, planned:0}));
  expenses.forEach(e => {
    if (!e.date) return;
    const day  = new Date(e.date + "T12:00:00").getDate();
    const week = Math.min(Math.floor((day - 1) / 7), 3);
    weeks[week].spend += e.amount;
    if ((e.type||"").toLowerCase() === "impulse") weeks[week].impulse++;
    else weeks[week].planned++;
  });
  const max = Math.max(...weeks.map(w => w.spend), 1);
  let html = `<div class="chart-wrap">`;
  weeks.forEach((w, i) => {
    const pct = (w.spend / max * 100).toFixed(1);
    html += `<div class="bar-row">
      <div class="bar-label">Wk${i+1}</div>
      <div class="bar-track"><div class="bar-fill bar-mixed" style="width:${pct}%"></div></div>
      <div class="bar-val" style="width:160px;font-size:10px">${w.spend > 0 ? fmt(w.spend) + ` · ${w.planned}P ${w.impulse}I` : "—"}</div>
    </div>`;
  });
  html += `<div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--navy)"></div>Total spend</div>
    <div class="legend-item">P = Planned &nbsp; I = Impulse</div>
  </div></div>`;
  return html;
}

// LOG EXPENSE
async function logExpense() {
  const date  = document.getElementById("expDate").value;
  const cat   = document.getElementById("expCat").value;
  const desc  = document.getElementById("expDesc").value.trim();
  const amt   = document.getElementById("expAmt").value;
  const notes = document.getElementById("expNotes").value.trim();
  const msg   = document.getElementById("formMsg");
  const btn   = document.getElementById("submitBtn");

  msg.className = "msg"; msg.style.display = "none";
  if (!date || !cat || !desc || !amt) { msg.textContent = "Please fill in date, category, description and amount."; msg.className = "msg error"; return; }

  btn.disabled = true; btn.textContent = "Saving...";
  try {
    const month = new Date(date + "T12:00:00").toLocaleDateString("en-US", {month:"long", year:"numeric"});
    const res  = await fetch(WEB_APP_URL, { method:"POST", body: JSON.stringify({ action:"add", date, category:cat, description:desc, amount:parseFloat(amt), notes, month, type:expenseType }) });
    const data = await res.json();
    if (!data.success) throw new Error("Write failed");
    msg.textContent = "Expense added!"; msg.className = "msg success";
    document.getElementById("expCat").value = "";
    document.getElementById("expDesc").value = "";
    document.getElementById("expAmt").value = "";
    document.getElementById("expNotes").value = "";
    document.getElementById("expDate").value = today.toISOString().split("T")[0];
    setTimeout(loadAll, 800);
  } catch(e) { msg.textContent = "Could not save. Please try again."; msg.className = "msg error"; }
  btn.disabled = false; btn.textContent = "Add Expense";
}

// EDIT / DELETE
function openEdit(idx) {
  const e = allExpenses[idx];
  editRowIndex = idx;
  editType = e.type || "Planned";
  document.getElementById("editDate").value  = e.date || "";
  document.getElementById("editCat").value   = e.category || "";
  document.getElementById("editDesc").value  = e.description || "";
  document.getElementById("editAmt").value   = e.amount || "";
  document.getElementById("editNotes").value = e.notes || "";
  setEditType(editType);
  document.getElementById("editModal").classList.add("open");
}

function closeModal() { document.getElementById("editModal").classList.remove("open"); }

async function saveEdit() {
  const date  = document.getElementById("editDate").value;
  const cat   = document.getElementById("editCat").value;
  const desc  = document.getElementById("editDesc").value.trim();
  const amt   = document.getElementById("editAmt").value;
  const notes = document.getElementById("editNotes").value.trim();
  const month = new Date(date + "T12:00:00").toLocaleDateString("en-US", {month:"long", year:"numeric"});
  try {
    const res  = await fetch(WEB_APP_URL, { method:"POST", body: JSON.stringify({ action:"edit", rowIndex: editRowIndex, date, category:cat, description:desc, amount:parseFloat(amt), notes, month, type:editType }) });
    const data = await res.json();
    if (!data.success) throw new Error();
    closeModal(); loadAll();
  } catch(e) { alert("Could not save edit. Please try again."); }
}

async function deleteExpense(idx) {
  if (!confirm("Delete this expense?")) return;
  try {
    const res  = await fetch(WEB_APP_URL, { method:"POST", body: JSON.stringify({ action:"delete", rowIndex: idx }) });
    const data = await res.json();
    if (!data.success) throw new Error();
    loadAll();
  } catch(e) { alert("Could not delete. Please try again."); }
}
